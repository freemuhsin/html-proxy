<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #proxy-form { margin: 20px; }
        #proxy-result { margin: 20px; border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>
    <h1>Full-Featured Web Proxy</h1>
    <form id="proxy-form">
        <input type="text" id="url-input" placeholder="Enter URL" required>
        <button type="submit">Proxy</button>
    </form>
    <div id="proxy-result"></div>

    <script>
        document.getElementById('proxy-form').onsubmit = function(event) {
            event.preventDefault();
            var url = document.getElementById('url-input').value;
            var targetUrl = 'https://croxyproxy.com/?url=' + encodeURIComponent(url);
            document.getElementById('proxy-result').innerHTML = '<iframe src="' + targetUrl + '" style="width:100%; height:600px; border:none;"></iframe>';
        };
    </script>
</body>
</html>
