<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input[type='text'], input[type='submit'] { padding: 10px; width: 300px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Web Proxy Interface</h1>
    <form action="" method="GET">
        <input type="text" name="url" placeholder="Enter URL to proxy" required />
        <input type="submit" value="Proxy" />
    </form>
    <div id="response">
        <!-- Here will be the response from the proxied URL -->
    </div>
</body>
</html>
